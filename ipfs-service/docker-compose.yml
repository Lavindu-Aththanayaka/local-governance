version: "3.9"

services:
  #  CONTAINER 1: IPFS Daemon
  ipfs-node:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    restart: unless-stopped

    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"

    volumes:
      - ipfs-data:/data/ipfs
      - ./ipfs-config:/container-init.d

    environment:
      - IPFS_PROFILE=server

    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  #  CONTAINER 2: Your Node.js IPFS Service
  ipfs-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ipfs-service
    restart: unless-stopped

    ports:
      - "4000:4000"

    environment:
      - PORT=4000
      - NODE_ENV=production

      - IPFS_HOST=ipfs-node
      - IPFS_PORT=5001
      - IPFS_PROTOCOL=http

      # File limits
      - MAX_FILE_SIZE=10485760
      - ALLOWED_MIME_TYPES=image/jpeg,image/png,image/gif,image/webp

      # Change this to your actual backend server URL
      - CORS_ORIGIN=http://51.210.111.188:3000

    depends_on:
      ipfs-node:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/api/ipfs/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Named volume for IPFS data persistence
volumes:
  ipfs-data:
    driver: local
