version: '3.8'

services:
  node1:
    image: ethereum/client-go:v1.13.15
    container_name: local-gov-node1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    entrypoint: ["/bin/sh", "-c"]
    ports:
      - "8545:8545"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - ./node1:/root/node1
      - ./genesis.json:/root/genesis.json
      - node1_data:/root/node1/geth
    command:
      - "if [ ! -s /root/node1/nodekey ] || [ $$(wc -c < /root/node1/nodekey) -lt 64 ]; then echo 'Writing static persistent nodekey...' && echo 'c5ba367e9f33080ec1eda12a9447ded9e70b723d63fead5f5874acfbfb452477' > /root/node1/nodekey; fi;
         if [ ! -d /root/node1/geth/chaindata ]; then echo 'Initializing Node 1...' && geth init --datadir /root/node1 /root/genesis.json; fi;
         exec geth
          --datadir=/root/node1
          --nodekey=/root/node1/nodekey
          --networkid=1337
          --http
          --http.addr=0.0.0.0
          --http.port=8545
          --http.corsdomain=*
          --http.vhosts=*
          --http.api=eth,net,web3,personal,miner,admin,clique
          --allow-insecure-unlock
          --mine
          --miner.etherbase=0x7E687086d737d5A06d13926505b7Fd5281aEdc23
          --unlock=0x7E687086d737d5A06d13926505b7Fd5281aEdc23
          --password=/root/node1/password.txt
          --miner.gasprice=0
          --txpool.pricelimit=0
          --rpc.allow-unprotected-txs"

  node2:
    image: ethereum/client-go:v1.13.15
    container_name: local-gov-node2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - node1
    entrypoint: ["/bin/sh", "-c"]
    ports:
      - "30304:30304"
      - "30304:30304/udp"
    volumes:
      - ./node2:/root/node2
      - ./genesis.json:/root/genesis.json
      - node2_data:/root/node2/geth
    # Removed --mine and --miner.etherbase to allow clean initial peering and syncing
    command:
      - "sleep 10 && if [ ! -d /root/node2/geth/chaindata ]; then echo 'Initializing Node 2...' && geth init --datadir /root/node2 /root/genesis.json; fi; exec geth
          --datadir=/root/node2
          --networkid=1337
          --port=30304
          --authrpc.port=8552
          --syncmode=full
          --bootnodes=enode://053c04feb485790df3dd6ee02e55a35bcffcff04ed57920323a418946ce195dd0d8b490898c8786605f2d55449c63c47ba73342326ebbed19b45145ee7383bf1@node1:30303
          --txpool.pricelimit=0
          --allow-insecure-unlock
          --mine
          --miner.etherbase=0x151e6113e425990Ea0fBe47f1EeE01Ada1a3798c
          --unlock=0x151e6113e425990Ea0fBe47f1EeE01Ada1a3798c
          --password=/root/node2/password.txt
          --rpc.allow-unprotected-txs"

  node3:
    image: ethereum/client-go:v1.13.15
    container_name: local-gov-node3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - node1
    entrypoint: ["/bin/sh", "-c"]
    ports:
      - "30305:30305"
      - "30305:30305/udp"
    volumes:
      - ./node3:/root/node3
      - ./genesis.json:/root/genesis.json
      - node3_data:/root/node3/geth
    # Removed --mine and --miner.etherbase to allow clean initial peering and syncing
    command:
      - "if [ ! -d /root/node3/geth/chaindata ]; then echo 'Initializing Node 3...' && geth init --datadir /root/node3 /root/genesis.json; fi; exec geth
          --datadir=/root/node3
          --networkid=1337
          --port=30305
          --authrpc.port=8553
          --syncmode=full
          --bootnodes=enode://053c04feb485790df3dd6ee02e55a35bcffcff04ed57920323a418946ce195dd0d8b490898c8786605f2d55449c63c47ba73342326ebbed19b45145ee7383bf1@node1:30303
          --txpool.pricelimit=0
          --allow-insecure-unlock
          --rpc.allow-unprotected-txs"

volumes:
  node1_data:
  node2_data:
  node3_data: